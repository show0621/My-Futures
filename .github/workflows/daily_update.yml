name: Daily Trading Data Update

on:
  schedule:
    # 台灣時間每天下午 3 點 (UTC 7:00) 執行 (週一至週五)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行按鈕

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Data Fetcher and Strategy
        run: python update_data.py

      - name: Commit and Push CSV changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/txf_options_backtest.csv
          git commit -m "Auto-update market data and strategy signals" || echo "No changes to commit"
          git push
